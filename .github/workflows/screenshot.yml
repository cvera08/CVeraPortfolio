name: Update Live Preview Screenshot

on:
  push:
    branches: [master]
    paths-ignore:
      - 'static/live-preview.png'
  workflow_dispatch:

concurrency:
  group: screenshot
  cancel-in-progress: true

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Wait for Vercel deploy
        run: sleep 60

      - name: Take screenshot
        run: |
          npx playwright screenshot \
            --browser chromium \
            --viewport-size "1280,800" \
            --full-page \
            https://cvera-portfolio.vercel.app/ \
            static/live-preview.png

      - name: Commit screenshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/live-preview.png
          if ! git diff --staged --quiet; then
            TRIGGER_DATE=$(git log -1 --format="%aI" HEAD)
            COMMIT_DATE=$(date -d "$TRIGGER_DATE + 5 minutes" --iso-8601=seconds)
            GIT_AUTHOR_DATE="$COMMIT_DATE" GIT_COMMITTER_DATE="$COMMIT_DATE" \
              git commit -m "chore: update live preview [skip ci]"
            git push
          fi
